# Render Blueprint — Dukaan Saathi (single Node process serves frontend + API)
# Docs: https://render.com/docs/blueprint-spec
#
# Data lives in a Turso / libSQL cloud database (free tier), so this runs on
# Render's FREE web-service plan — no persistent disk needed. Note: free web
# services sleep after ~15 min of inactivity and cold-start on the next request.
services:
  - type: web
    name: dukaan-saathi
    runtime: node
    plan: free
    region: singapore # closest to India; change if preferred
    # Install frontend deps, build dist/, then install server deps.
    buildCommand: npm ci && npm run build && npm --prefix server ci
    startCommand: npm --prefix server start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: VALIDATE_TWILIO_SIGNATURE
        value: "true"
      # Secrets — set these in the Render dashboard (never committed):
      - key: JWT_SECRET
        sync: false # use a fresh strong random value
      # Turso / libSQL database (create with `turso db create` + a token):
      - key: TURSO_DATABASE_URL
        sync: false # e.g. libsql://<db>-<org>.turso.io
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false # optional; MUST be a real sk-ant-api… key (else rule-based fallback)
      - key: CLAUDE_MODEL
        sync: false # optional; defaults to claude-sonnet-5
      - key: SARVAM_API_KEY
        sync: false
      - key: SARVAM_STT_MODEL
        sync: false # optional
      - key: SARVAM_STT_URL
        sync: false # optional
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
