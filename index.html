<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Dukaan Saathi — run your whole shop by voice, WhatsApp, or a photo of your notebook. Zero app, zero typing, zero learning curve."
    />
    <title>Dukaan Saathi — Your shop, run by your voice</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      try {
        const root = document.documentElement;
        root.classList.remove("dark");
        root.style.colorScheme = "light";
        localStorage.setItem("dukaan_theme", "light");
        localStorage.setItem("dukaan_theme_explicit", "light");
      } catch (error) {
        console.warn("Theme bootstrap failed", error);
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
